<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 660" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrB" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="880" height="660" fill="#ffffff"/>
  <text x="440" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">Vanilla deep stack vs. Looped (weight-tied) transformer</text>
  <text x="440" y="56" text-anchor="middle" font-size="13" fill="#64748b">Same color = same kind of layer. Difference is structural: distinct stacked weights vs. one shared block looped with injection.</text>

  <rect x="24"  y="74" width="320" height="556" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="360" y="74" width="496" height="556" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>

  <!-- ================= VANILLA ================= -->
  <text x="184" y="104" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Vanilla Transformer</text>
  <text x="184" y="123" text-anchor="middle" font-size="12" fill="#64748b">8 distinct layers → 8× params</text>

  <text x="184" y="150" text-anchor="middle" font-size="11.5" fill="#334155">output logits</text>
  <rect x="84" y="158" width="200" height="24" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="184" y="174" text-anchor="middle" font-size="11.5" fill="#334155">RMSNorm → head</text>
  <line x1="184" y1="200" x2="184" y2="186" stroke="#475569" stroke-width="1.4" marker-end="url(#arr)"/>

  <g font-size="11.5" fill="#0f172a" text-anchor="middle">
    <rect x="84" y="204" width="200" height="24" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="184" y="220">layer 8  (W₈)</text>
    <rect x="84" y="232" width="200" height="24" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="184" y="248">layer 7  (W₇)</text>
    <rect x="84" y="260" width="200" height="24" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="184" y="276">layer 6  (W₆)</text>
    <rect x="84" y="288" width="200" height="24" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="184" y="304">layer 5  (W₅)</text>
    <rect x="84" y="316" width="200" height="24" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="184" y="332">layer 4  (W₄)</text>
    <rect x="84" y="344" width="200" height="24" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="184" y="360">layer 3  (W₃)</text>
    <rect x="84" y="372" width="200" height="24" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="184" y="388">layer 2  (W₂)</text>
    <rect x="84" y="400" width="200" height="24" rx="5" fill="#dbeafe" stroke="#2563eb"/><text x="184" y="416">layer 1  (W₁)</text>
  </g>
  <line x1="184" y1="446" x2="184" y2="430" stroke="#475569" stroke-width="1.4" marker-end="url(#arr)"/>
  <rect x="84" y="450" width="200" height="24" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="184" y="466" text-anchor="middle" font-size="11.5" fill="#334155">token + pos embedding</text>
  <text x="184" y="494" text-anchor="middle" font-size="11.5" fill="#64748b">input tokens</text>

  <text x="184" y="560" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">depth 8 · params = 8 layers</text>
  <text x="184" y="580" text-anchor="middle" font-size="11" fill="#64748b">distinct weights, each used once</text>
  <text x="184" y="598" text-anchor="middle" font-size="11" fill="#64748b">fixed depth</text>

  <!-- ================= LOOPED (faithful to models.py) ================= -->
  <text x="600" y="104" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Looped / Parcae</text>
  <text x="600" y="123" text-anchor="middle" font-size="12" fill="#64748b">1 shared block, looped ×T → 2× params</text>

  <!-- main column boxes: cx = 600, x 510..690 -->
  <text x="600" y="150" text-anchor="middle" font-size="11.5" fill="#334155">output logits</text>
  <rect x="510" y="158" width="180" height="24" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="600" y="174" text-anchor="middle" font-size="11.5" fill="#334155">RMSNorm → head</text>
  <line x1="600" y1="214" x2="600" y2="186" stroke="#475569" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="612" y="205" font-size="9.5" fill="#64748b">after T loops</text>

  <!-- injection = OUTPUT of the step -->
  <rect x="510" y="216" width="180" height="48" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="600" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">injection (output)</text>
  <text x="600" y="252" text-anchor="middle" font-size="11" fill="#0f172a">h ← Ā·h + B·e + blockOut</text>
  <line x1="600" y1="286" x2="600" y2="266" stroke="#475569" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="616" y="279" font-size="9.5" fill="#64748b">blockOut</text>

  <!-- shared block -->
  <rect x="510" y="288" width="180" height="96" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="600" y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">shared block (reused ×T)</text>
  <rect x="528" y="312" width="144" height="30" rx="5" fill="#eff6ff" stroke="#2563eb"/><text x="600" y="332" text-anchor="middle" font-size="11" fill="#0f172a">layer A  (Wₐ)</text>
  <rect x="528" y="346" width="144" height="30" rx="5" fill="#eff6ff" stroke="#2563eb"/><text x="600" y="366" text-anchor="middle" font-size="11" fill="#0f172a">layer B  (W_b)</text>
  <line x1="600" y1="406" x2="600" y2="388" stroke="#475569" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="612" y="399" font-size="9.5" fill="#64748b">x</text>

  <!-- combine (block input) -->
  <rect x="510" y="408" width="180" height="40" rx="8" fill="#f1f5f9" stroke="#2563eb" stroke-width="1.8"/>
  <text x="600" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">block input  x =</text>
  <text x="600" y="441" text-anchor="middle" font-size="10.5" fill="#0f172a">norm(h + e) + loopIdxEmb(t)</text>

  <!-- embed -->
  <line x1="600" y1="472" x2="600" y2="450" stroke="#475569" stroke-width="1.4" marker-end="url(#arr)"/>
  <rect x="510" y="474" width="180" height="26" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="600" y="491" text-anchor="middle" font-size="11" fill="#334155">token + pos embedding → e</text>
  <text x="600" y="516" text-anchor="middle" font-size="11" fill="#64748b">input tokens   (h₀ = e)</text>

  <!-- e rail (left): e feeds BOTH combine (norm(h+e)) and injection (B·e) -->
  <path d="M 510 487 L 470 487 L 470 240 L 510 240" fill="none" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="470" y1="428" x2="510" y2="428" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="462" y="360" text-anchor="middle" font-size="10.5" font-weight="600" fill="#475569" transform="rotate(-90 462 360)">e  (token vector)</text>

  <!-- loop index embedding -> combine -->
  <rect x="372" y="452" width="120" height="40" rx="7" fill="#eff6ff" stroke="#2563eb"/>
  <text x="432" y="469" text-anchor="middle" font-size="10.5" fill="#0f172a">loop index</text>
  <text x="432" y="483" text-anchor="middle" font-size="10.5" fill="#0f172a">embedding(t)</text>
  <path d="M 492 462 C 504 462, 506 446, 510 440" fill="none" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- feedback rail (right): injection output h fed back into the next combine -->
  <path d="M 690 240 L 800 240 L 800 428 L 690 428" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="816" y="334" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb" transform="rotate(90 816 334)">loop × T   (h fed back)</text>

  <text x="600" y="556" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">effective depth = 2·T · params = 2 layers</text>
  <text x="600" y="576" text-anchor="middle" font-size="11" fill="#64748b">same block re-read every loop · raise T to think longer</text>
  <text x="600" y="594" text-anchor="middle" font-size="11" fill="#64748b">Ā learnable, ρ(Ā)&lt;1 keeps the loop stable at high T</text>

  <text x="440" y="646" text-anchor="middle" font-size="11.5" fill="#334155">Looped: each step reads block input x = norm(h+e) + loopIdx(t); the shared block produces blockOut; the injection writes the next state h = Ā·h + B·e + blockOut, which loops back.</text>
</svg>
