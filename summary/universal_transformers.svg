<svg viewBox="0 0 880 660" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Looped recurrent-depth transformer architecture, with the MoE-FFN expanded</title>
  <desc>Tokens are embedded, then refined by a single shared block looped T times. Each step adds a contractive input injection and a step embedding, runs self-attention, then a Mixture-of-Experts FFN. A per-token ACT halting stage lets easy tokens stop early before the final norm and head. The MoE-FFN is expanded on the right: a router branches each token to its top-k routed experts, plus always-on shared experts. Three dials: number of experts is knowledge, top-k is compute per token, loop steps is depth.</desc>
  <style>
    svg { --ink:#2C2C2A; --muted:#5F5E5A; --line:#B4B2A9; --soft:#F1EFE8;
          --accent:#534AB7; --accent-soft:#EEEDFE; --accent-line:#7F77DD; }
    @media (prefers-color-scheme: dark){
      svg { --ink:#F1EFE8; --muted:#B4B2A9; --line:#5F5E5A; --soft:#2C2C2A;
            --accent:#AFA9EC; --accent-soft:#26215C; --accent-line:#7F77DD; }
    }
    .ttl{ fill:var(--ink); font-size:14px; font-weight:700; }
    .lbl{ fill:var(--ink); font-size:12px; }
    .lblb{ fill:var(--ink); font-size:12px; font-weight:700; }
    .mut{ fill:var(--muted); font-size:10.5px; }
    .box{ fill:var(--soft); stroke:var(--line); stroke-width:1.5; }
    .acc{ fill:var(--accent-soft); stroke:var(--accent-line); stroke-width:1.5; }
    .accthick{ fill:var(--accent-soft); stroke:var(--accent-line); stroke-width:2.5; }
    .esel{ fill:var(--accent); }
    .eidle{ fill:var(--soft); stroke:var(--line); stroke-width:1; stroke-dasharray:3 3; }
    .ar{ stroke:var(--muted); stroke-width:1.5; fill:none; }
    .loop{ fill:none; stroke:var(--accent-line); stroke-width:1.5; stroke-dasharray:6 4; }
    .conn{ stroke:var(--accent-line); stroke-width:1.5; fill:none; stroke-dasharray:4 3; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="var(--muted)"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="var(--accent-line)"/>
    </marker>
  </defs>

  <!-- ===================== MAIN DATA-FLOW (left) ===================== -->
  <text x="30" y="34" class="ttl">Looped recurrent-depth transformer</text>

  <!-- output head -->
  <rect x="95" y="52" width="190" height="30" rx="7" class="box"/>
  <text x="190" y="71" class="lbl" text-anchor="middle">Norm → Head → logits</text>
  <path class="ar" d="M190,102 L190,84" marker-end="url(#ah)"/>

  <!-- ACT halting -->
  <rect x="95" y="104" width="190" height="38" rx="7" class="box"/>
  <text x="190" y="121" class="lbl" text-anchor="middle" font-weight="700">ACT halting</text>
  <text x="190" y="135" class="mut" text-anchor="middle">per-token early stop</text>
  <path class="ar" d="M190,298 L190,144" marker-end="url(#ah)"/>

  <!-- loop container -->
  <rect x="64" y="160" width="242" height="364" rx="12" class="loop"/>
  <text x="74" y="178" class="mut">Recurrent Block · × T · shared weights</text>

  <!-- MoE-FFN (highlighted) -->
  <rect x="95" y="300" width="190" height="52" rx="8" class="accthick"/>
  <text x="190" y="321" class="lblb" text-anchor="middle">MoE-FFN</text>
  <text x="190" y="338" class="mut" text-anchor="middle">transform + where facts live</text>
  <path class="ar" d="M190,386 L190,356" marker-end="url(#ah)"/>

  <!-- self-attention -->
  <rect x="95" y="386" width="190" height="40" rx="8" class="acc"/>
  <text x="190" y="403" class="lbl" text-anchor="middle">Self-Attention</text>
  <text x="190" y="417" class="mut" text-anchor="middle">mix across tokens</text>
  <path class="ar" d="M190,456 L190,430" marker-end="url(#ah)"/>

  <!-- injection + step embedding -->
  <rect x="95" y="456" width="190" height="42" rx="8" class="acc"/>
  <text x="190" y="475" class="lbl" text-anchor="middle">+ inject(e)  + step[t]</text>
  <text x="190" y="489" class="mut" text-anchor="middle">contractive re-anchor</text>
  <path class="ar" d="M190,558 L190,502" marker-end="url(#ah)"/>

  <!-- embedding -->
  <rect x="95" y="560" width="190" height="32" rx="7" class="box"/>
  <text x="190" y="580" class="lbl" text-anchor="middle">Embedding(tokens)</text>

  <!-- loop-back arrow -->
  <path class="ar" d="M95,326 L48,326 L48,477 L93,477" marker-end="url(#ah)"/>
  <text x="40" y="408" class="mut" transform="rotate(-90 40 408)">× T (same W)</text>

  <!-- connector to MoE detail -->
  <path class="conn" d="M285,326 L452,326" marker-end="url(#ap)"/>

  <!-- ===================== MoE DETAIL (right) ===================== -->
  <rect x="452" y="244" width="408" height="250" rx="12" class="box"/>
  <text x="472" y="270" class="lblb">Inside the MoE-FFN — where facts live</text>
  <text x="472" y="287" class="mut">many expert memories; the router branches per token</text>

  <!-- shared experts (always on) -->
  <rect x="472" y="300" width="368" height="28" rx="6" class="acc"/>
  <text x="656" y="318" class="mut" text-anchor="middle">shared experts · always on (common knowledge)</text>

  <!-- routed experts row: filled = chosen (top-k), dashed = skipped -->
  <g>
    <rect x="472" y="356" width="60" height="34" rx="5" class="eidle"/>
    <text x="502" y="377" class="mut" text-anchor="middle">E1</text>
    <rect x="546" y="356" width="60" height="34" rx="5" class="esel"/>
    <text x="576" y="377" fill="#FFFFFF" font-size="10.5" text-anchor="middle">E2</text>
    <rect x="620" y="356" width="60" height="34" rx="5" class="eidle"/>
    <text x="650" y="377" class="mut" text-anchor="middle">E3</text>
    <rect x="694" y="356" width="60" height="34" rx="5" class="esel"/>
    <text x="724" y="377" fill="#FFFFFF" font-size="10.5" text-anchor="middle">E4</text>
    <rect x="768" y="356" width="60" height="34" rx="5" class="eidle"/>
    <text x="798" y="377" class="mut" text-anchor="middle">E5</text>
  </g>
  <text x="472" y="410" class="mut">routed experts — run only top-k (filled = chosen, dashed = skipped)</text>

  <!-- router -->
  <rect x="568" y="436" width="176" height="30" rx="7" class="acc"/>
  <text x="656" y="455" class="lbl" text-anchor="middle">router → pick top-k</text>
  <path class="ar" d="M656,436 L656,394" marker-end="url(#ah)"/>

  <!-- dials footer -->
  <text x="30" y="630" class="mut">Dials:  n_experts = how much it KNOWS    ·    top-k = compute per token    ·    loop steps = depth</text>
</svg>
